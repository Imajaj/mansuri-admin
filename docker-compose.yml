version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mansuri
      POSTGRES_PASSWORD: mansuri123
      POSTGRES_DB: mansuri_db
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"          # expose for local tooling (DBeaver, pgAdmin, etc.)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mansuri -d mansuri_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://mansuri:mansuri123@db:5432/mansuri_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app   # hot-reload in dev; remove for production

  # ── Frontend (Streamlit) ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      API_BASE_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  pg_data:
